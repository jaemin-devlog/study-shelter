spring:
  application:
    name: simsim
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ddanjit}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: 8080
  forward-headers-strategy: framework

ddanjit:
  session-ttl-seconds: 7200
  heartbeat-interval-millis: 10000
  stale-threshold-millis: 30000
  cleanup-fixed-delay-millis: 15000

logging:
  level:
    likelion.simsim.config: INFO
