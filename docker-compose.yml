services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-shelter-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ddanjit
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: ddanjit-mysql
    environment:
      MYSQL_DATABASE: ddanjit
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: ddanjit-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
